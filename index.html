<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RNQJ8VH5CH"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-RNQJ8VH5CH');
    </script>
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wisrdbl03l");
    </script>
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="다크모드로 변경" aria-pressed="false">
            <span class="theme-icon" aria-hidden="true">☾</span>
            <span class="theme-label">다크모드</span>
        </button>
        <h1>로또 번호 생성기</h1>
        <div class="number-container">
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
        </div>
        <button id="generate-btn">번호 생성</button>

        <form class="partner-form" action="https://formspree.io/f/xojybrlw" method="POST">
            <h2>제휴 문의</h2>
            <input type="hidden" name="_subject" value="로또 번호 생성기 제휴 문의">

            <label for="company">회사명</label>
            <input id="company" name="company" type="text" autocomplete="organization" placeholder="회사명을 입력하세요">

            <label for="name">담당자명</label>
            <input id="name" name="name" type="text" autocomplete="name" placeholder="담당자명을 입력하세요" required>

            <label for="email">이메일</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="reply@example.com" required>

            <label for="message">문의 내용</label>
            <textarea id="message" name="message" rows="5" placeholder="제휴 제안 내용을 남겨주세요" required></textarea>

            <button type="submit">문의 보내기</button>
        </form>

        <section class="comments-section" aria-labelledby="comments-title">
            <h2 id="comments-title">댓글</h2>
            <div id="disqus_thread"></div>
        </section>
    </div>
    <script src="main.js"></script>
    <script>
        var disqus_config = function () {
            this.page.url = 'https://choys99999-maker.github.io/product-builder-lecture/';
            this.page.identifier = 'product-builder-lecture-home';
        };

        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://https-product-builder-lecture-c2s-pages-dev.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>댓글을 보려면 JavaScript를 활성화해주세요.</noscript>
</body>
</html>
