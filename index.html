<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="다크모드로 변경" aria-pressed="false">
            <span class="theme-icon" aria-hidden="true">☾</span>
            <span class="theme-label">다크모드</span>
        </button>
        <h1>로또 번호 생성기</h1>
        <div class="number-container">
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
        </div>
        <button id="generate-btn">번호 생성</button>

        <form class="partner-form" action="https://formspree.io/f/xojybrlw" method="POST">
            <h2>제휴 문의</h2>
            <input type="hidden" name="_subject" value="로또 번호 생성기 제휴 문의">

            <label for="company">회사명</label>
            <input id="company" name="company" type="text" autocomplete="organization" placeholder="회사명을 입력하세요">

            <label for="name">담당자명</label>
            <input id="name" name="name" type="text" autocomplete="name" placeholder="담당자명을 입력하세요" required>

            <label for="email">이메일</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="reply@example.com" required>

            <label for="message">문의 내용</label>
            <textarea id="message" name="message" rows="5" placeholder="제휴 제안 내용을 남겨주세요" required></textarea>

            <button type="submit">문의 보내기</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
